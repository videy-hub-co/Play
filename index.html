<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

/* HEADER */
.warning{
    background:#1a0008;
    color:#ff4d88;
    text-align:center;
    padding:12px;
    font-weight:bold;
    border-bottom:1px solid #ff2d6f;
}

/* HERO */
.hero{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.video-box{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
}

.video-box img{
    width:100%;
    display:block;
    border-radius:15px;
}

/* PLAY BUTTON */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    background:rgba(255,0,85,.8);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

/* DURASI */
.duration{
    position:absolute;
    bottom:15px;
    right:15px;
    background:rgba(0,0,0,.7);
    padding:5px 10px;
    border-radius:8px;
    font-size:14px;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:20px;
}

.title h1{
    font-size:42px;
    color:#ff2d6f;
}

.title p{
    margin-top:10px;
    color:#ccc;
}

/* BUTTONS */
.button-group{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.watch-btn{
    display:block;
    text-align:center;
    background:#ff2d6f;
    padding:18px;
    border-radius:12px;
    color:#fff;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.watch-btn:hover{
    background:#ff4d88;
}

/* BANNER */
.banner{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:25px;
}

.gallery img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #ff2d6f;
    cursor:pointer;
}

/* INFO */
.info{
    margin-top:30px;
    text-align:center;
    color:#aaa;
    font-size:14px;
    padding-bottom:30px;
}

/* MOBILE */
@media(max-width:768px){

.title h1{
    font-size:28px;
}

.play-btn{
    width:90px;
    height:90px;
    font-size:45px;
}

.gallery{
    grid-template-columns:repeat(2,1fr);
}

.gallery img{
    height:120px;
}

.watch-btn{
    font-size:18px;
    padding:15px;
}

}
</style>
